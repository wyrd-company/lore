name: cd

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(cat VERSION)"
          if [[ "$tag" == v* ]]; then
            echo "Tags must not start with v: $tag" >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be SemVer without a v prefix: $tag" >&2
            exit 1
          fi
          if [[ "$tag" != "$version" ]]; then
            echo "Tag '$tag' does not match VERSION '$version'" >&2
            exit 1
          fi
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Tag $tag does not point at a commit on main" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { os: ubuntu-latest, goos: linux, goarch: arm64 }
          - { os: macos-latest, goos: darwin, goarch: amd64 }
          - { os: macos-latest, goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci && npm run build
        working-directory: web
      - name: Build and package CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          name="lore-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "artifacts/${name}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/wyrd-company/lore/internal/version.Value=${VERSION}" -o "artifacts/${name}/lore" ./cmd/lore
          tar -C "artifacts/${name}" -czf "artifacts/${name}.tar.gz" lore
          (cd artifacts && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          rm -rf "artifacts/${name}"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/*

  release:
    needs: [version, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: true

  publish-image:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/wyrd-company/lore
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.version.outputs.version, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  homebrew:
    needs: [version, build-cli, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew formula validation
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: actions/checkout@v4
        with:
          repository: wyrd-company/homebrew-tools
          path: homebrew-tools
          ssh-key: ${{ secrets.FORMULAE_PUBLISH_KEY }}
      - name: Generate, commit, and push formula
        env:
          ARTIFACT_ROOT: artifacts
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          TAP_DIR: homebrew-tools
        run: ./scripts/publish-homebrew-tap.sh
