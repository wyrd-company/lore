x-lore-image: &lore-image
  image: lore:${LORE_VERSION:-dev}
  build:
    context: .
    target: server
    args:
      VERSION: ${LORE_VERSION:-dev}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: lore
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - lore-postgres:/var/lib/postgresql/data

  migrate:
    <<: *lore-image
    command: ["migrate"]
    restart: "no"
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lore:lore@postgres:5432/lore?sslmode=disable}

  lore-server:
    <<: *lore-image
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lore:lore@postgres:5432/lore?sslmode=disable}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      LORE_INGEST_TOKEN: ${LORE_INGEST_TOKEN:-local-ingest-token}
      LORE_ADMIN_TOKEN: ${LORE_ADMIN_TOKEN:-local-admin-token}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      LORE_LISTEN_ADDRESS: :8080
    ports:
      - "8080:8080"

  lore-watcher:
    <<: *lore-image
    profiles: [watch]
    depends_on:
      lore-server:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/lore"]
    command: ["watch", "--config", "/config/lore-watch.yml"]
    environment:
      LORE_CONFIG: /config/lore-client.yml
    volumes:
      - ${LORE_WATCH_CONFIG:-./lore-watch.yml}:/config/lore-watch.yml:ro
      - ${LORE_CLIENT_CONFIG:-./lore-client.yml}:/config/lore-client.yml:ro
      - ${LORE_SOURCE_ROOT:-.}:/sources:ro
    healthcheck:
      disable: true

volumes:
  lore-postgres:
