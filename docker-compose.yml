services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: lore
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - lore-postgres:/var/lib/postgresql/data

  lore-server:
    build:
      context: .
      target: server
      args:
        VERSION: ${LORE_VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lore:lore@postgres:5432/lore?sslmode=disable}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      LORE_INGEST_TOKEN: ${LORE_INGEST_TOKEN:-local-ingest-token}
      LORE_ADMIN_TOKEN: ${LORE_ADMIN_TOKEN:-local-admin-token}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      LORE_LISTEN_ADDRESS: :8080
    ports:
      - "8080:8080"

volumes:
  lore-postgres:
